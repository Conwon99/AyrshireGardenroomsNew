[build]
  publish = "dist"
  command = "npm run build"
  functions = ".netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Domain configuration
# Note: You still need to add the domain in Netlify dashboard and configure DNS
[[redirects]]
  from = "https://www.ayrshiregardenrooms.co.uk/*"
  to = "https://ayrshiregardenrooms.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.ayrshiregardenrooms.co.uk/*"
  to = "https://ayrshiregardenrooms.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://ayrshiregardenrooms.co.uk/*"
  to = "https://ayrshiregardenrooms.co.uk/:splat"
  status = 301
  force = true

# Consolidate duplicate garden-rooms URLs (SEO: one canonical service page)
[[redirects]]
  from = "https://ayrshiregardenrooms.co.uk/service/garden-rooms"
  to = "https://ayrshiregardenrooms.co.uk/garden-rooms"
  status = 301
  force = true

[[redirects]]
  from = "https://ayrshiregardenrooms.co.uk/service/garden-rooms/"
  to = "https://ayrshiregardenrooms.co.uk/garden-rooms"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Ensure correct content types
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# Cache static assets
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"


